<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | SmartHub</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="login-page-wrapper animate-fade-in">
        <!-- Left Side: Registration Image -->
        <div class="login-image-side" style="background-image: url('assets/hero_bg.jpg');">
            <div class="login-image-content">
                <div class="logo" style="font-size: 3rem; margin-bottom: 2rem;"
                    onclick="window.location.href='index.html'"><span>SmartHub</span></div>
                <h2 class="gold-text" style="font-size: 2.5rem;">Join Our Community</h2>
                <p style="font-size: 1.2rem; color: #fff; max-width: 400px; margin: 0 auto;">Connect with premium
                    homeowners or unlock new growth for your service business.</p>
            </div>
        </div>

        <!-- Right Side: Registration Form -->
        <div class="login-form-side">
            <div style="width: 100%; max-width: 500px;">
                <div class="form-container" style="margin: 0; padding: 0; width: 100%; max-width: 100%;">
                    <h2 style="margin-bottom: 1rem;">Create Your Account</h2>
                    <p style="color: var(--text-muted); margin-bottom: 2.5rem;">Join the standard of excellence in home
                        care.</p>

                    <form id="registerForm">
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                            <div class="form-group">
                                <label>Username</label>
                                <input type="text" id="username" placeholder="john_doe" required>
                            </div>
                            <div class="form-group">
                                <label>Email</label>
                                <input type="email" id="email" placeholder="john@example.com" required>
                            </div>
                        </div>

                        <div class="form-group" style="position: relative;">
                            <label>Password</label>
                            <input type="password" id="password" placeholder="••••••••" required
                                style="padding-right: 40px; width: 100%;">
                            <i class="fas fa-eye" id="togglePassword"
                                style="position: absolute; right: 15px; bottom: 17px; cursor: pointer; color: var(--text-muted);"
                                onclick="togglePasswordVisibility('password', 'togglePassword')"></i>
                        </div>

                        <div class="form-group">
                            <label>Join As</label>
                            <select id="role" style="background: rgba(15, 23, 42, 0.5); color: white;">
                                <option value="user">User (Looking for Services)</option>
                                <option value="servicer">Job (Worker)</option>
                            </select>
                        </div>

                        <div class="form-group" id="jobRoleGroup" style="display: none;">
                            <label>Select Job Role</label>
                            <select id="category_id" style="background: rgba(15, 23, 42, 0.5); color: white;">
                                <option value="">Choose your specialty...</option>
                                <option value="1">Plumbing</option>
                                <option value="2">Electrical</option>
                                <option value="3">Cleaning</option>
                                <option value="4">Painting</option>
                                <option value="5">Mechanics</option>
                                <option value="6">Movers</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Location (City)</label>
                            <input type="text" id="location" placeholder="e.g. New York" required>
                        </div>

                        <button type="submit" class="btn btn-primary"
                            style="width: 100%; height: 55px; font-size: 1.1rem; background: var(--gold); margin-top: 1rem;">
                            Establish Account
                        </button>
                    </form>

                    <p style="text-align: center; margin-top: 2rem; color: var(--text-muted);">
                        Already have an account? <a href="login.html"
                            style="color: var(--gold); text-decoration: none; font-weight: 600;">Login here</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        // Redirect if already logged in
        const existingUser = JSON.parse(localStorage.getItem('hub_user'));
        if (existingUser) {
            if (existingUser.role === 'servicer') {
                window.location.href = 'dashboard-servicer.html';
            } else if (existingUser.role === 'admin') {
                window.location.href = 'dashboard-admin.html';
            } else {
                window.location.href = 'dashboard-user.html';
            }
        }

        const roleSelect = document.getElementById('role');
        const jobRoleGroup = document.getElementById('jobRoleGroup');
        const categorySelect = document.getElementById('category_id');

        // Toggle Job Category based on role
        roleSelect.addEventListener('change', () => {
            if (roleSelect.value === 'servicer') {
                jobRoleGroup.style.display = 'block';
                loadCategories();
            } else {
                jobRoleGroup.style.display = 'none';
            }
        });

        async function loadCategories() {
            try {
                const response = await fetch('http://localhost:5000/api/admin/categories');
                if (!response.ok) return; // Fallback to static if server is down
                const categories = await response.json();

                if (categories.length > 0) {
                    categorySelect.innerHTML = '<option value="">Choose your specialty...</option>';
                    categories.forEach(cat => {
                        const option = document.createElement('option');
                        option.value = cat.id;
                        option.textContent = cat.name;
                        categorySelect.appendChild(option);
                    });
                }
            } catch (err) {
                console.error("Failed to load categories dynamically, using static defaults.", err);
            }
        }

        function togglePasswordVisibility(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value;
            const location = document.getElementById('location').value;
            const category_id = document.getElementById('category_id').value;

            if (role === 'servicer' && !category_id) {
                alert("Please select a job category");
                return;
            }

            try {
                await api.auth.register({ username, email, password, role, location, category_id });
                alert("Registration successful! Please login.");
                window.location.href = 'login.html';
            } catch (err) {
                alert(err.message);
            }
        });
    </script>
</body>

</html>
